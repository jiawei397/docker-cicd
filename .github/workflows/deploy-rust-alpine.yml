name: Rust Alpine

on:
  push:
    tags:
      - 'rust-alpine_*' # rust-alpine_1.81.0-alpine3.20_1

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract Tag
        id: extract_tag
        run: echo "tag=$(echo ${GITHUB_REF#refs/tags/rust-alpine_})" >> $GITHUB_OUTPUT

      - name: Extract Base Image
        id: extract_base_image
        run: echo "base_image=$(echo ${{ steps.extract_tag.outputs.tag }} | cut -d_ -f1)" >> $GITHUB_OUTPUT

      - name: Extract Base Image Version
        id: extract_base_image_version
        run: echo "base_image_version=$(echo ${{ steps.extract_base_image.outputs.base_image }} | cut -d- -f1)" >> $GITHUB_OUTPUT

      - name: Extract Image Tag
        id: extract_image_tag
        run: echo "image_tag=alpine${{ steps.extract_base_image_version.outputs.base_image_version }}-$(echo ${{ steps.extract_tag.outputs.tag }} | cut -d_ -f2)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: rust/Dockerfile_alpine
          push: true
          build-args: |
            BASE_IMAGE=rust:${{ steps.extract_base_image.outputs.base_image }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/rust:${{ steps.extract_image_tag.outputs.image_tag }}
