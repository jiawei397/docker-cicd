name: Rust Runtime

on:
  push:
    tags:
      - 'rust-runtime_*' # rust-runtime_3.20_1，最终 tag 为：rust-runtime-alpine:3.20-1

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract Tag
        id: extract_tag
        run: echo "tag=$(echo ${GITHUB_REF#refs/tags/rust-runtime_})" >> $GITHUB_OUTPUT

      - name: Extract Base Image
        id: extract_base_image
        run: echo "base_image=$(echo ${{ steps.extract_tag.outputs.tag }} | cut -d_ -f1)" >> $GITHUB_OUTPUT

      - name: Extract Image Tag
        id: extract_image_tag
        run: echo "image_tag=rust-runtime-alpine:${{ steps.extract_base_image.outputs.base_image }}-$(echo ${{ steps.extract_tag.outputs.tag }} | cut -d_ -f2)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: rust/Dockerfile-runtime-alpine
          push: true
          build-args: |
            BASE_IMAGE=alpine:${{ steps.extract_base_image.outputs.base_image }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/rust:${{ steps.extract_image_tag.outputs.image_tag }}
