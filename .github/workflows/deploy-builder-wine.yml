name: Build and Push Electron Builder Wine Image

on:
  push:
    tags:
      # 格式: electronuserland_builder@<builder版本>_<node版本>
      # 例如: electronuserland_builder@20-wine-03.25_22
      - 'electronuserland_builder@*'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract Tag
        id: extract_tag
        run: echo "tag=$(echo ${GITHUB_REF#refs/tags/electronuserland_builder@})" >> $GITHUB_OUTPUT
      
      - name: Extract Builder Version
        id: extract_builder_version
        run: |
          tag=$(echo ${{ steps.extract_tag.outputs.tag }})
          builder_version=$(echo $tag | cut -d'_' -f1)
          echo "builder_version=$builder_version" >> $GITHUB_OUTPUT
      
      - name: Extract Node Version
        id: extract_node_version
        run: |
          tag=$(echo ${{ steps.extract_tag.outputs.tag }})
          node_version=$(echo $tag | cut -d'_' -f2)
          echo "node_version=$node_version" >> $GITHUB_OUTPUT
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: electronuserland/Dockerfile
          push: true
          build-args: |
            BASE_IMAGE=electronuserland/builder:${{ steps.extract_builder_version.outputs.builder_version }}
            NODE_VERSION=${{ steps.extract_node_version.outputs.node_version }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/electronuserland-builder:${{ steps.extract_builder_version.outputs.builder_version }}-node${{ steps.extract_node_version.outputs.node_version }}
