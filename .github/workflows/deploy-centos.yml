name: centos

on:
  push:
    tags:
      - 'centos_*' 
      # centos_7_dev-tools_1，以下划线连接，第 1 段是 centos，第 2 段是基础镜像版本(7)，第 3 段是自定义标识(dev-tools)，第 4 段是版本号
      # 最终推送的镜像为：${{ secrets.DOCKER_USERNAME }}/centos:7-dev-tools-1

jobs:
  build: 
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Extract Tag
        id: extract_tag
        run: echo "tag=$(echo ${GITHUB_REF#refs/tags/centos_})" >> $GITHUB_OUTPUT

      - name: Extract Base Image Version
        id: extract_base_version
        run: echo "base_version=$(echo ${{ steps.extract_tag.outputs.tag }} | cut -d_ -f1)" >> $GITHUB_OUTPUT

      - name: Extract Custom Tag
        id: extract_custom_tag
        run: echo "custom_tag=$(echo ${{ steps.extract_tag.outputs.tag }} | cut -d_ -f2)" >> $GITHUB_OUTPUT

      - name: Extract Version Number
        id: extract_version
        run: echo "version=$(echo ${{ steps.extract_tag.outputs.tag }} | cut -d_ -f3)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: centos/Dockerfile
          push: true
          build-args: |
            BASE_IMAGE=centos:${{ steps.extract_base_version.outputs.base_version }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/centos:${{ steps.extract_base_version.outputs.base_version }}-${{ steps.extract_custom_tag.outputs.custom_tag }}-${{ steps.extract_version.outputs.version }}
