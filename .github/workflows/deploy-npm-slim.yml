name: npm-slim

on:
  push:
    tags:
      - 'npm-slim_*' 
      # npm-slim_20-slim_20.10.0-slim，以下划线连接，第 1 段是 npm-slim，第 2 段是基础镜像名，也就是下面的 BASE_IMAGE，第 3 段是要打的镜像的 tag
      # 最终推送的镜像为：${{ secrets.DOCKER_USERNAME }}/node:20.10.0-slim

jobs:
  build: 
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Extract Tag
        id: extract_tag
        run: echo "tag=$(echo ${GITHUB_REF#refs/tags/npm-slim_})" >> $GITHUB_OUTPUT

      - name: Extract Base Image
        id: extract_base_image
        run: echo "base_image=node:$(echo ${{ steps.extract_tag.outputs.tag }} | cut -d_ -f1)" >> $GITHUB_OUTPUT

      - name: Extract Image Tag
        id: extract_image_tag
        run: echo "image_tag=$(echo ${{ steps.extract_tag.outputs.tag }} | cut -d_ -f2)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: npm/Dockerfile_slim
          push: true
          build-args: |
            BASE_IMAGE=${{ steps.extract_base_image.outputs.base_image }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/node:${{ steps.extract_image_tag.outputs.image_tag }}
